<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tata AIA — Client Dashboard</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f9f8f6; --bg2: #ffffff; --bg3: #f1f0ec;
    --text: #1a1a18; --text2: #6b6a64; --text3: #a0a09a;
    --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.18);
    --green: #1D9E75; --green-light: #E1F5EE; --green-dark: #085041;
    --radius: 8px; --radius-lg: 12px;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .lock-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .lock-box { background: var(--bg2); border: 0.5px solid var(--border2); border-radius: var(--radius-lg); padding: 2rem; width: 100%; max-width: 360px; text-align: center; }
  .lock-badge { background: var(--green); color: #fff; font-size: 10px; font-weight: 600; padding: 3px 10px; border-radius: 4px; letter-spacing: 0.05em; display: inline-block; margin-bottom: 1.2rem; }
  .lock-title { font-size: 18px; font-weight: 500; color: var(--text); margin-bottom: 6px; }
  .lock-sub { font-size: 13px; color: var(--text3); margin-bottom: 1.5rem; }
  .lock-input { width: 100%; padding: 10px 12px; font-size: 14px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg); color: var(--text); font-family: inherit; margin-bottom: 10px; text-align: center; letter-spacing: 0.05em; }
  .lock-input:focus { outline: none; border-color: var(--green); }
  .lock-btn { width: 100%; padding: 11px; font-size: 14px; font-weight: 500; background: var(--green); color: #fff; border: none; border-radius: var(--radius); cursor: pointer; font-family: inherit; }
  .lock-btn:hover { background: #0F6E56; }
  .lock-error { font-size: 12px; color: #B91C1C; margin-top: 8px; display: none; }
  .dashboard { display: none; }
  .topnav { background: var(--bg2); border-bottom: 0.5px solid var(--border); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 10; }
  .nav-brand { display: flex; align-items: center; gap: 10px; }
  .nav-badge { background: var(--green); color: #fff; font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 4px; letter-spacing: 0.05em; }
  .nav-title { font-size: 15px; font-weight: 500; }
  .nav-right { display: flex; align-items: center; gap: 8px; }
  .last-updated { font-size: 11px; color: var(--text3); }
  .btn { display: flex; align-items: center; gap: 6px; font-size: 13px; padding: 7px 14px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg3); color: var(--text); cursor: pointer; font-family: inherit; transition: background 0.15s; }
  .btn:hover { background: var(--bg2); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .main { max-width: 900px; margin: 0 auto; padding: 1.5rem 2rem 3rem; }
  .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1.5rem; }
  .metric { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 16px 18px; }
  .metric-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
  .metric-value { font-size: 28px; font-weight: 500; line-height: 1; }
  .metric-value.sm { font-size: 15px; padding-top: 4px; }
  .metric-sub { font-size: 11px; color: var(--text3); margin-top: 4px; }
  .section-label { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
  .source-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 1.5rem; }
  .source-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px; }
  .source-name { font-size: 12px; color: var(--text2); margin-bottom: 6px; }
  .source-count { font-size: 22px; font-weight: 500; }
  .source-bar-wrap { margin-top: 8px; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .source-bar { height: 100%; background: var(--green); border-radius: 2px; transition: width 0.6s; }
  .controls { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; }
  .search-wrap { flex: 1; position: relative; }
  .search-wrap i { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 16px; color: var(--text3); pointer-events: none; }
  .search-wrap input { width: 100%; padding: 9px 10px 9px 34px; font-size: 13px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg2); color: var(--text); font-family: inherit; }
  .search-wrap input:focus { outline: none; border-color: var(--green); }
  .filter-select { font-size: 13px; padding: 9px 12px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg2); color: var(--text); font-family: inherit; cursor: pointer; }
  .client-count-label { font-size: 12px; color: var(--text3); white-space: nowrap; }
  .client-table { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
  .client-row { border-bottom: 0.5px solid var(--border); padding: 14px 16px; display: flex; align-items: center; gap: 12px; }
  .client-row:last-child { border-bottom: none; }
  .avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--green-light); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: var(--green-dark); flex-shrink: 0; }
  .client-name { font-size: 14px; font-weight: 500; color: var(--text); flex: 1; }
  .client-date { font-size: 12px; color: var(--text3); white-space: nowrap; }
  .pill { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 999px; }
  .pill-wa { background: #E1F5EE; color: #085041; }
  .pill-li { background: #E6F1FB; color: #0C447C; }
  .pill-em { background: #FAEEDA; color: #633806; }
  .pill-un { background: #f1f0ec; color: #6b6a64; }
  .empty-state { text-align: center; padding: 4rem; color: var(--text3); }
  .empty-state i { font-size: 40px; display: block; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }
  .error-box { background: #FCEBEB; border: 0.5px solid #F09595; border-radius: var(--radius); padding: 12px 16px; font-size: 13px; color: #501313; margin-bottom: 1rem; }
  .spinning { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (max-width: 700px) {
    .metrics { grid-template-columns: repeat(2, 1fr); }
    .source-grid { grid-template-columns: repeat(2, 1fr); }
    .main { padding: 1rem; }
    .topnav { padding: 0 1rem; }
  }
</style>
</head>
<body>

<div class="lock-screen" id="lock-screen">
  <div class="lock-box">
    <span class="lock-badge">TATA AIA</span>
    <div class="lock-title">Client Dashboard</div>
    <div class="lock-sub">Enter your password to continue</div>
    <input class="lock-input" type="password" id="pw-input" placeholder="Password" onkeydown="if(event.key==='Enter') unlock()">
    <button class="lock-btn" onclick="unlock()">Unlock</button>
    <div class="lock-error" id="lock-error">Incorrect password. Try again.</div>
  </div>
</div>

<div class="dashboard" id="dashboard">
  <nav class="topnav">
    <div class="nav-brand">
      <span class="nav-badge">TATA AIA</span>
      <span class="nav-title">Client Dashboard</span>
    </div>
    <div class="nav-right">
      <span class="last-updated" id="last-updated"></span>
      <button class="btn" onclick="lockDashboard()"><i class="ti ti-lock"></i> Lock</button>
      <button class="btn" id="refresh-btn" onclick="loadData()"><i class="ti ti-refresh" id="refresh-icon"></i> Refresh</button>
    </div>
  </nav>
  <div class="main">
    <div id="error-area"></div>
    <div class="metrics">
      <div class="metric"><div class="metric-label">Total submissions</div><div class="metric-value" id="m-total">—</div><div class="metric-sub">All time</div></div>
      <div class="metric"><div class="metric-label">This week</div><div class="metric-value" id="m-week">—</div><div class="metric-sub">Last 7 days</div></div>
      <div class="metric"><div class="metric-label">Top source</div><div class="metric-value sm" id="m-source">—</div><div class="metric-sub" id="m-source-sub"></div></div>
      <div class="metric"><div class="metric-label">Latest client</div><div class="metric-value sm" id="m-latest">—</div><div class="metric-sub" id="m-latest-sub"></div></div>
    </div>
    <div class="section-label">Submissions by source</div>
    <div class="source-grid" id="source-grid">
      <div class="source-card"><div class="source-name">WhatsApp personal</div><div class="source-count">—</div></div>
      <div class="source-card"><div class="source-name">WhatsApp broadcast</div><div class="source-count">—</div></div>
      <div class="source-card"><div class="source-name">LinkedIn</div><div class="source-count">—</div></div>
      <div class="source-card"><div class="source-name">Email</div><div class="source-count">—</div></div>
    </div>
    <div class="controls">
      <div class="search-wrap">
        <i class="ti ti-search"></i>
        <input type="text" id="search-input" placeholder="Search by name…" oninput="renderClients()">
      </div>
      <select class="filter-select" id="source-filter" onchange="renderClients()">
        <option value="">All sources</option>
        <option value="whatsapp">WhatsApp</option>
        <option value="linkedin">LinkedIn</option>
        <option value="email">Email</option>
        <option value="unknown">Unknown / Direct</option>
      </select>
      <span class="client-count-label" id="client-count"></span>
    </div>
    <div class="client-table" id="client-list">
      <div class="empty-state"><i class="ti ti-loader"></i><p>Loading clients…</p></div>
    </div>
  </div>
</div>

<script>
const PASSWORD = 'gratitude';
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyGGmIO9nJLN91MSMvEm1spZ4rYQlT5ZSKKH5GShOrweUV3HA7k87z5QbQPaizHt9Jp/exec';
const PROXY = 'https://corsproxy.io/?';
let allClients = [];

function unlock() {
  if (document.getElementById('pw-input').value === PASSWORD) {
    document.getElementById('lock-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadData();
  } else {
    document.getElementById('lock-error').style.display = 'block';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
}

function lockDashboard() {
  document.getElementById('lock-screen').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('pw-input').value = '';
  document.getElementById('lock-error').style.display = 'none';
}

function initials(name) {
  if (!name) return '?';
  return name.trim().split(' ').slice(0,2).map(w => w[0]||'').join('').toUpperCase();
}

function sourcePill(src) {
  if (!src) return '<span class="pill pill-un">Direct</span>';
  const u = src.toLowerCase();
  if (u.includes('whatsapp') && u.includes('personal')) return '<span class="pill pill-wa">WA Personal</span>';
  if (u.includes('whatsapp') && u.includes('broadcast')) return '<span class="pill pill-wa">WA Broadcast</span>';
  if (u.includes('whatsapp')) return '<span class="pill pill-wa">WhatsApp</span>';
  if (u.includes('linkedin')) return '<span class="pill pill-li">LinkedIn</span>';
  if (u.includes('email')) return '<span class="pill pill-em">Email</span>';
  return '<span class="pill pill-un">Other</span>';
}

function sourceLabel(src) {
  if (!src) return 'unknown';
  const u = src.toLowerCase();
  if (u.includes('whatsapp') && u.includes('personal')) return 'WhatsApp personal';
  if (u.includes('whatsapp') && u.includes('broadcast')) return 'WhatsApp broadcast';
  if (u.includes('whatsapp')) return 'WhatsApp';
  if (u.includes('linkedin')) return 'LinkedIn';
  if (u.includes('email')) return 'Email';
  return 'Other';
}

function fmtDate(ts) {
  if (!ts) return '—';
  try {
    const d = new Date(ts);
    if (isNaN(d.getTime())) return ts;
    return d.getDate() + ' ' + ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()] + ' ' + d.getFullYear();
  } catch(e) { return ts; }
}

function daysAgo(ts) {
  if (!ts) return '';
  try {
    const days = Math.floor((Date.now() - new Date(ts).getTime()) / 86400000);
    if (days === 0) return 'Today';
    if (days === 1) return 'Yesterday';
    return days + ' days ago';
  } catch(e) { return ''; }
}

function isThisWeek(ts) {
  if (!ts) return false;
  try { return (Date.now() - new Date(ts).getTime()) < 7 * 86400000; }
  catch(e) { return false; }
}

async function loadData() {
  const btn = document.getElementById('refresh-btn');
  const icon = document.getElementById('refresh-icon');
  btn.disabled = true;
  icon.classList.add('spinning');
  document.getElementById('error-area').innerHTML = '';
  try {
    const res = await fetch(PROXY + encodeURIComponent(SCRIPT_URL + '?callback=x'));
    const text = await res.text();
    const json = JSON.parse(text.replace(/^x\(/, '').replace(/\)$/, ''));
    allClients = (json.data || []).filter(c => c['Name'] && c['Name'].trim() !== '');
    updateMetrics();
    renderClients();
    document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit'});
  } catch(err) {
    document.getElementById('error-area').innerHTML = '<div class="error-box"><strong>Could not load data.</strong> ' + err.message + '</div>';
    document.getElementById('client-list').innerHTML = '<div class="empty-state"><i class="ti ti-wifi-off"></i><p>No data loaded</p></div>';
  } finally {
    btn.disabled = false;
    icon.classList.remove('spinning');
  }
}

function updateMetrics() {
  document.getElementById('m-total').textContent = allClients.length;
  document.getElementById('m-week').textContent = allClients.filter(c => isThisWeek(c['Submitted on'])).length;

  const sourceCounts = {};
  allClients.forEach(c => {
    const s = sourceLabel(c['Source']);
    sourceCounts[s] = (sourceCounts[s] || 0) + 1;
  });

  const top = Object.entries(sourceCounts).sort((a,b) => b[1]-a[1])[0];
  document.getElementById('m-source').textContent = top ? top[0] : '—';
  document.getElementById('m-source-sub').textContent = top ? top[1] + ' submission' + (top[1]!==1?'s':'') : '';

  const latest = allClients[0];
  if (latest) {
    document.getElementById('m-latest').textContent = (latest['Name']||'').split(' ')[0] || '—';
    document.getElementById('m-latest-sub').textContent = daysAgo(latest['Submitted on']);
  }

  const sources = [
    {label:'WhatsApp personal', key:'WhatsApp personal'},
    {label:'WhatsApp broadcast', key:'WhatsApp broadcast'},
    {label:'LinkedIn', key:'LinkedIn'},
    {label:'Email', key:'Email'}
  ];
  const total = allClients.length;
  document.getElementById('source-grid').innerHTML = sources.map(s => {
    const count = sourceCounts[s.key] || 0;
    const pct = total > 0 ? Math.round((count/total)*100) : 0;
    return '<div class="source-card"><div class="source-name">'+s.label+'</div><div class="source-count">'+count+'</div><div class="source-bar-wrap"><div class="source-bar" style="width:'+pct+'%"></div></div></div>';
  }).join('');
}

function renderClients() {
  const q = (document.getElementById('search-input').value||'').toLowerCase();
  const sf = (document.getElementById('source-filter').value||'').toLowerCase();

  const filtered = allClients.filter(c => {
    const name = (c['Name']||'').toLowerCase();
    const matchQ = !q || name.includes(q);
    const src = (c['Source']||'').toLowerCase();
    const matchS = !sf || (sf==='unknown' ? (!src||src==='unknown') : src.includes(sf));
    return matchQ && matchS;
  });

  document.getElementById('client-count').textContent = filtered.length + ' client' + (filtered.length!==1?'s':'');

  if (!filtered.length) {
    document.getElementById('client-list').innerHTML = '<div class="empty-state"><i class="ti ti-users"></i><p>No clients yet — share your form link to get started</p></div>';
    return;
  }

  document.getElementById('client-list').innerHTML = filtered.map(c => {
    return '<div class="client-row">'
      +'<div class="avatar">'+initials(c['Name'])+'</div>'
      +'<span class="client-name">'+c['Name']+'</span>'
      +sourcePill(c['Source'])
      +'<span class="client-date">'+fmtDate(c['Submitted on'])+'</span>'
      +'</div>';
  }).join('');
}
</script>
</body>
</html>
